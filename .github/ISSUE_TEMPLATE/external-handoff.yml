name: External handoff acceptance / 外部用户真实交接验收
description: Submit one privacy-safe Codex to Claude Code handoff record / 提交一次不含私密聊天的真实交接记录
title: "[External acceptance] <GitHub handle> / <Windows or macOS>"
labels:
  - compatibility
  - docs
body:
  - type: markdown
    attributes:
      value: |
        Thank you for testing AgentCarry. Please submit this Issue from the same GitHub account named below. Do not attach screenshots, transcripts, session files, API keys, email addresses, local paths, or provider responses.

        感谢参与测试。请使用下方填写的同一个 GitHub 账号亲自提交本 Issue。不要上传截图、完整聊天、session 文件、密钥、邮箱、本地路径或 provider 原始响应。

        Follow / 按照：[2-minute external acceptance](https://github.com/Jettlin927/agentcarry/blob/main/docs/external-acceptance.md) · [中文步骤](https://github.com/Jettlin927/agentcarry/blob/main/docs/external-acceptance.zh-CN.md)
  - type: checkboxes
    id: eligibility
    attributes:
      label: Eligibility / 参与资格
      options:
        - label: I had not authored commits or pull requests in AgentCarry before this attempt. / 本次尝试前，我没有为 AgentCarry 提交过 commit 或 PR。
          required: true
        - label: I consent to publish this sanitized record under my public GitHub handle. / 我同意以公开 GitHub 用户名发布这份脱敏记录。
          required: true
  - type: input
    id: github_handle
    attributes:
      label: GitHub handle
      description: Must match the account opening this Issue. / 必须与提交本 Issue 的账号一致。
      placeholder: octocat
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system / 操作系统
      options:
        - Windows
        - macOS
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS version and architecture / 系统版本与架构
      placeholder: Windows 11 x64 / macOS 15.5 arm64
    validations:
      required: true
  - type: textarea
    id: versions
    attributes:
      label: Version facts / 版本信息
      description: Copy version command output only. The maintainer resolves the pinned tag to its commit. / 只复制版本命令输出；维护者会把固定 tag 解析为 commit。
      placeholder: |
        AgentCarry: 0.1.0-acceptance.1
        Node.js: v22.x.x
        Codex: <version>
        Claude Code: <version>
    validations:
      required: true
  - type: dropdown
    id: source_state
    attributes:
      label: Source state / 来源会话状态
      options:
        - idle / 已完成或空闲
        - active / 仍在进行
    validations:
      required: true
  - type: dropdown
    id: selection
    attributes:
      label: Source selection / 来源选择
      options:
        - automatic / 自动选择
        - explicit session ID / 显式 session ID
    validations:
      required: true
  - type: dropdown
    id: outcome
    attributes:
      label: Outcome / 结果
      description: Continued means Claude began the recorded first action, not merely that a session opened. / continued 指 Claude 已开始 Capsule 记录的第一动作，而不只是打开了 session。
      options:
        - continued / 已开始第一动作
        - blocked / 未能开始第一动作
    validations:
      required: true
  - type: dropdown
    id: target_session_created
    attributes:
      label: Target session created? / 是否创建目标 session？
      options:
        - "yes / 是"
        - "no / 否"
    validations:
      required: true
  - type: dropdown
    id: first_action_started
    attributes:
      label: Recorded first action started? / 是否开始记录中的第一动作？
      description: This must be yes for continued and no for blocked. / continued 必须选是，blocked 必须选否。
      options:
        - "yes / 是"
        - "no / 否"
    validations:
      required: true
  - type: input
    id: command_started_at
    attributes:
      label: Command start time in UTC / 命令开始时间（UTC）
      description: RFC 3339 to whole seconds; do not include your time zone name. / 使用精确到秒的 RFC 3339，不填写时区名称。
      placeholder: 2026-07-23T07:58:00Z
    validations:
      required: true
  - type: input
    id: outcome_recorded_at
    attributes:
      label: Outcome time in UTC / 结果时间（UTC）
      description: The time the first action started or the attempt became blocked. / 第一动作开始或确定阻塞的时刻。
      placeholder: 2026-07-23T08:00:00Z
    validations:
      required: true
  - type: input
    id: seconds
    attributes:
      label: Seconds from command to outcome / 从输入命令到结果的秒数
      description: If continued, this is Time to Continuation. / 如成功，这是 Time to Continuation。
      placeholder: "95"
    validations:
      required: true
  - type: dropdown
    id: losses
    attributes:
      label: Loss codes shown by AgentCarry / AgentCarry 显示的损失代码
      description: Select every displayed code, or NONE. / 选择全部显示的代码；没有则选 NONE。
      multiple: true
      options:
        - NONE
        - APPEND_DURING_SOURCE_CAPTURE
        - ASSISTANT_STATE_MISSING
        - ATTACHMENTS_NOT_TRANSFERRED
        - CURRENT_USER_MESSAGE_MISSING
        - DETERMINISTIC_SEMANTIC_HEURISTIC
        - HIDDEN_AGENT_STATE_UNAVAILABLE
        - NATIVE_PARTIAL_ASSISTANT_OUTPUT_EXCLUDED
        - SENSITIVE_VALUES_ALLOWED
        - SENSITIVE_VALUES_REDACTED
        - SOURCE_AGENT_CHECKPOINT
        - TRAILING_SOURCE_FRAGMENT_IGNORED
    validations:
      required: true
  - type: dropdown
    id: supplement
    attributes:
      label: Manual supplement categories / 手工补充类别
      description: Select categories only; never submit the missing content. / 只选类别，绝不提交缺失内容本身。
      multiple: true
      options:
        - NONE
        - objective
        - constraint
        - decision
        - failed-attempt
        - workspace
        - validation
        - next-action
        - other
    validations:
      required: true
  - type: dropdown
    id: blockers
    attributes:
      label: Blocker code / 阻塞代码
      description: Select one stable code after a blocked attempt, or NONE after continuation. Do not submit provider output. / blocked 时选择稳定代码；成功则选 NONE。不要提交 provider 输出。
      options:
        - NONE
        - NO_SESSION_IN_WORKSPACE
        - AMBIGUOUS_SESSION
        - SESSION_NOT_FOUND
        - ACTIVE_SESSION
        - SESSION_ACTIVITY_MISMATCH
        - UNSTABLE_SOURCE_SNAPSHOT
        - CHECKPOINT_INVALID
        - CHECKPOINT_MESSAGE_MISMATCH
        - CHECKPOINT_SESSION_NOT_ACTIVE
        - CRITICAL_TRANSFER_LOSS
        - TARGET_LAUNCH_FAILED
        - TARGET_LAUNCH_PLAN_INVALID
        - TARGET_SEED_FAILED
        - TARGET_SEED_INVALID
        - TARGET_INTERACTIVE_FAILED
        - TARGET_PROVIDER_UNAVAILABLE
        - OTHER
    validations:
      required: true
  - type: dropdown
    id: blocker_phase
    attributes:
      label: Blocker phase / 阻塞阶段
      description: Select not applicable after continuation. / 成功续作后选择不适用。
      options:
        - not applicable / 不适用
        - source-selection
        - capsule-build
        - confirmation
        - target-seed
        - target-resume
        - continuation
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy attestation / 隐私确认
      options:
        - label: This Issue contains no secret or credential. / 本 Issue 不含密钥或凭证。
          required: true
        - label: This Issue contains no private transcript or screenshot. / 本 Issue 不含私密聊天或截图。
          required: true
        - label: This Issue contains no unredacted source session file or local path. / 本 Issue 不含未脱敏来源文件或本地路径。
          required: true
